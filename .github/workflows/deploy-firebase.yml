# Deploy automático para o projeto Firebase ao fazer push em `main`.
# Requisito: no GitHub, em Settings → Secrets and variables → Actions,
# criar o secret FIREBASE_TOKEN (valor obtido localmente com: firebase login:ci)

name: Deploy Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build web --release

      - name: Setup Node (Cloud Functions)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Dependencies functions
        run: npm ci
        working-directory: functions

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --non-interactive
