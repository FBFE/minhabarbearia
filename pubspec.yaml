name: minhabarbearia
description: Sistema de agendamento para barbearias - Flutter Web
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.3
  cloud_functions: ^5.2.0

  # UI & Media
  flex_color_picker: ^3.8.0
  file_picker: ^8.1.2
  image: ^4.0.17
  mask_text_input_formatter: ^2.9.0
  intl: ^0.20.2
  path: ^1.9.0
  table_calendar: ^3.0.9
  google_fonts: ^6.2.1
  fl_chart: ^0.70.0
  uuid: ^4.5.1
  url_launcher: ^6.2.5
  http: ^1.2.2
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.0

  # PWA install prompt
  pwa_install: ^0.0.6

  # Routing
  go_router: ^14.6.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Code generation
  json_annotation: ^4.9.0
  crop_your_image: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/login_brand_logo.png
