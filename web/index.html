  <!-- Capture PWA install prompt (pwa_install package) -->
  <script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });
    function promptInstall() {
      if (deferredPrompt) deferredPrompt.prompt();
    }
    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      if (typeof appInstalled === 'function') appInstalled();
    });
    function getLaunchMode() {
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      if (deferredPrompt && typeof hasPrompt === 'function') hasPrompt();
      if (document.referrer && document.referrer.startsWith('android-app://')) {
        if (typeof appLaunchedAsTWA === 'function') appLaunchedAsTWA();
      } else if (window.navigator.standalone || isStandalone) {
        if (typeof appLaunchedAsPWA === 'function') appLaunchedAsPWA();
      } else {
        if (typeof appLaunchedInBrowser === 'function') appLaunchedInBrowser();
      }
    }
  </script>
</head>
<body onload="if (typeof getLaunchMode === 'function') getLaunchMode();">
  <script src="flutter_bootstrap.js" async></script>
</body>
